<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Medical Cross with Heartbeat -->
  <g transform="translate(10, 10)">
    <!-- Cross -->
    <rect x="15" y="5" width="10" height="30" fill="url(#logoGradient)" rx="2"/>
    <rect x="5" y="15" width="30" height="10" fill="url(#logoGradient)" rx="2"/>
    
    <!-- Heartbeat line -->
    <path d="M 0 20 L 8 20 L 12 10 L 16 30 L 20 20 L 28 20 L 32 15 L 36 25 L 40 20" 
          stroke="url(#logoGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Digital dots -->
    <circle cx="38" cy="8" r="2" fill="#0891b2" opacity="0.6"/>
    <circle cx="38" cy="32" r="2" fill="#7c3aed" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="65" y="28" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">
    MedFlow
  </text>
  <text x="65" y="45" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" fill="#64748b" letter-spacing="2">
    EMR
  </text>
</svg>
