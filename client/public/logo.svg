<svg width="240" height="60" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- J-shaped Medical Cross / Shield Hybrid -->
  <g transform="translate(10, 8)" filter="url(#glow)">
    <!-- Base shield/cross shape -->
    <path d="M 12 4 C 18 4, 26 4, 32 4 C 34 4, 36 6, 36 8 L 36 28 C 36 38, 28 44, 22 44 C 14 44, 8 38, 8 32 C 8 30, 10 28, 12 28 C 14 28, 16 30, 16 32 C 16 34, 18 36, 22 36 C 26 36, 28 32, 28 28 L 28 12 L 12 12 C 10 12, 8 10, 8 8 C 8 6, 10 4, 12 4 Z" fill="url(#logoGradient)"/>
    <!-- Heartbeat/Sparkle accent inside -->
    <path d="M 28 18 L 22 18 L 19 12 L 15 24 L 12 18 L 8 18" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  
  <!-- Text -->
  <text x="58" y="38" font-family="'Plus Jakarta Sans', 'Inter', 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a" letter-spacing="-1">
    Jioplix
  </text>
  <text x="160" y="38" font-family="'Plus Jakarta Sans', 'Inter', 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="400" fill="#64748b" letter-spacing="-0.5">
    HIMS
  </text>
</svg>
